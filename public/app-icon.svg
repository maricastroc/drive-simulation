<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C202C"/>
      <stop offset="1" stop-color="#0E121A"/>
    </linearGradient>
    <radialGradient id="tileGlow2" cx="32" cy="13" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#69748C" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#69748C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thermal2" cx="32" cy="32" r="25" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7A38E"/>
      <stop offset="0.30" stop-color="#D0897D"/>
      <stop offset="0.52" stop-color="#C7A882"/>
      <stop offset="0.74" stop-color="#8FB6BE"/>
      <stop offset="1" stop-color="#6E93D6"/>
    </radialGradient>
    <radialGradient id="core2" cx="32" cy="32" r="5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6DCCB"/>
      <stop offset="0.5" stop-color="#E09883"/>
      <stop offset="1" stop-color="#CE7E6E"/>
    </radialGradient>
    <radialGradient id="glow2" cx="32" cy="32" r="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8907E" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#C98A7C" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#C98A7C" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#tile2)"/>
  <rect width="64" height="64" rx="15" fill="url(#tileGlow2)"/>
  <rect x="0.6" y="0.6" width="62.8" height="62.8" rx="14.4" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <path d="M15 0.9 H49" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="0.8" stroke-linecap="round"/>

  <!-- rede fria (taupe do app) -->
  <g stroke="#6A5859" stroke-opacity="0.28" stroke-width="0.9" stroke-linecap="round">
    <path d="M18 11 V53"/><path d="M46 11 V53"/>
    <path d="M11 18 H53"/><path d="M11 46 H53"/>
  </g>
  <g fill="#6A5859" fill-opacity="0.5">
    <circle cx="18" cy="18" r="0.85"/><circle cx="46" cy="18" r="0.85"/>
    <circle cx="18" cy="46" r="0.85"/><circle cx="46" cy="46" r="0.85"/>
  </g>

  <!-- calor suave da junção -->
  <circle cx="32" cy="32" r="13" fill="url(#glow2)" filter="url(#soft2)"/>

  <!-- vias: térmico suave, quente na junção, esfriando nas bordas -->
  <g stroke="url(#thermal2)" stroke-width="4.4" stroke-linecap="round">
    <path d="M8 32 H56"/>
    <path d="M32 8 V56"/>
  </g>

  <!-- agentes: cápsula creme, nariz claro -->
  <g>
    <rect x="12.2" y="30.7" width="5.6" height="2.6" rx="1.3" fill="#EBE2D3" stroke="#0B0D13" stroke-opacity="0.45" stroke-width="0.4"/>
    <rect x="16.2" y="30.8" width="1.5" height="2.4" rx="0.75" fill="#FBF6EE"/>
    <rect x="30.7" y="46.2" width="2.6" height="5.6" rx="1.3" fill="#EBE2D3" stroke="#0B0D13" stroke-opacity="0.45" stroke-width="0.4"/>
    <rect x="30.8" y="46.3" width="2.4" height="1.5" rx="0.75" fill="#FBF6EE"/>
  </g>

  <!-- núcleo: junção mais quente, contido -->
  <circle cx="32" cy="32" r="5.4" fill="none" stroke="#DA9583" stroke-opacity="0.45" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="4.3" fill="url(#core2)"/>
  <circle cx="32" cy="32" r="1.7" fill="#FBEEE3"/>
</svg>
